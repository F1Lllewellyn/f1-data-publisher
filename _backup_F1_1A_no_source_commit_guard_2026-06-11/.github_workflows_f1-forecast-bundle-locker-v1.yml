name: F1 Forecast Bundle Locker v1

on:
  workflow_dispatch:
    inputs:
      event_id:
        description: 'Event id, e.g. 2026_spanish_gp'
        required: true
        default: '2026_next_event'
      race_name:
        description: 'Race name'
        required: true
        default: 'Next F1 Event'
      round:
        description: 'Round number if known'
        required: false
        default: ''
      gate:
        description: 'Gate to lock'
        required: true
        type: choice
        options:
          - all
          - pre_weekend
          - post_fp3
          - post_qualifying
          - race_result
          - post_event
        default: all
      commit_outputs:
        description: 'Commit bundle outputs back to repository'
        required: true
        type: boolean
        default: true
  schedule:
    - cron: '*/15 * * * 5,6,0'

permissions:
  contents: write
  actions: read

jobs:
  lock-forecast-bundles:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Determine inputs
        id: vars
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "event_id=${{ inputs.event_id }}" >> "$GITHUB_OUTPUT"
            echo "race_name=${{ inputs.race_name }}" >> "$GITHUB_OUTPUT"
            echo "round=${{ inputs.round }}" >> "$GITHUB_OUTPUT"
            echo "gate=${{ inputs.gate }}" >> "$GITHUB_OUTPUT"
            echo "commit_outputs=${{ inputs.commit_outputs }}" >> "$GITHUB_OUTPUT"
            echo "scheduled_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "event_id=scheduled_auto_gate_check" >> "$GITHUB_OUTPUT"
            echo "race_name=Scheduled Auto Gate Check" >> "$GITHUB_OUTPUT"
            echo "round=" >> "$GITHUB_OUTPUT"
            echo "gate=all" >> "$GITHUB_OUTPUT"
            echo "commit_outputs=true" >> "$GITHUB_OUTPUT"
            echo "scheduled_run=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Create forecast bundles
        shell: bash
        run: |
          set -euo pipefail
          args=(
            --repo-root .
            --source-root .
            --event-id "${{ steps.vars.outputs.event_id }}"
            --race-name "${{ steps.vars.outputs.race_name }}"
            --season 2026
            --round "${{ steps.vars.outputs.round }}"
            --gate "${{ steps.vars.outputs.gate }}"
          )
          if [ "${{ steps.vars.outputs.commit_outputs }}" = "true" ]; then
            args+=(--commit-latest)
          fi
          if [ "${{ steps.vars.outputs.scheduled_run }}" = "true" ]; then
            args+=(--scheduled-run --require-scheduled-source)
          fi
          python scripts/forecast_bundles/create_forecast_bundles_v1.py "${args[@]}"
      - name: Upload forecast bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: f1-forecast-bundles-v1
          if-no-files-found: warn
          path: |
            latest/forecast_bundles/**
            history/forecast_bundles/**
            _runtime/forecast_bundle_locker_guard/**
      - name: Commit forecast bundle outputs
        if: ${{ steps.vars.outputs.commit_outputs == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          added_any=false
          for path in latest/forecast_bundles history/forecast_bundles _runtime/forecast_bundle_locker_guard; do
            if [ -e "$path" ]; then
              git add "$path"
              added_any=true
            fi
          done
          if [ "$added_any" = "false" ]; then
            echo "No forecast bundle output paths exist. Scheduler guard likely exited cleanly."
            exit 0
          fi
          if git diff --cached --quiet; then
            echo "No forecast bundle changes to commit. Scheduler guard may have exited cleanly with no source rows."
          else
            git commit -m "Add F1 saved forecast bundles ${{ steps.vars.outputs.event_id }} ${{ steps.vars.outputs.gate }}"
            git push
          fi
