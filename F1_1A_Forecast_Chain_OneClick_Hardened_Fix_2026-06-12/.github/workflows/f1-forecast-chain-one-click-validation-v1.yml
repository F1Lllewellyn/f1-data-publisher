name: F1 Forecast Chain One-Click Validation v1

on:
  workflow_dispatch:
    inputs:
      validation_label:
        description: "Friendly label for this validation run. Leave default unless you have a specific reason."
        required: true
        default: "manual_forecast_producer_validation"
      race_name:
        description: "Friendly race/test name used in reports."
        required: true
        default: "Manual Forecast Producer Validation"
      commit_outputs:
        description: "Commit generated validation outputs when real rows/bundles are created."
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      allow_structural_placeholders:
        description: "Keep false. True only for deliberate structural testing."
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write
  actions: read

jobs:
  one-click-forecast-chain-validation:
    runs-on: ubuntu-latest
    env:
      EVENT_ID: ${{ github.event.inputs.validation_label || 'manual_forecast_producer_validation' }}
      RACE_NAME: ${{ github.event.inputs.race_name || 'Manual Forecast Producer Validation' }}
      COMMIT_OUTPUTS: ${{ github.event.inputs.commit_outputs || 'true' }}
      ALLOW_STRUCTURAL_PLACEHOLDERS: ${{ github.event.inputs.allow_structural_placeholders || 'false' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Preflight workflow and script compatibility
        shell: bash
        run: |
          set -euo pipefail
          echo "Forecast validation label: ${EVENT_ID}"
          echo "Race/test name: ${RACE_NAME}"
          echo "Commit outputs: ${COMMIT_OUTPUTS}"
          echo "Allow structural placeholders: ${ALLOW_STRUCTURAL_PLACEHOLDERS}"

          required_files=(
            "scripts/forecast_bundles/write_gate_forecast_rows_v1.py"
            "scripts/forecast_bundles/validate_forecast_chain_readiness_v1.py"
            "scripts/forecast_bundles/create_forecast_bundles_v1.py"
          )

          missing=0
          for f in "${required_files[@]}"; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing required script: $f"
              missing=1
            else
              echo "Found: $f"
              python "$f" --help >/tmp/help.txt 2>&1 || {
                echo "::error::Script help failed for $f"
                cat /tmp/help.txt
                missing=1
              }
            fi
          done

          if [ "$missing" != "0" ]; then
            echo "::error::Preflight failed. No chain steps will run."
            exit 1
          fi

      - name: Run source writer
        shell: bash
        run: |
          set -euo pipefail
          args=(--event-id "${EVENT_ID}" --gate all --lane all)
          echo "Running Source Writer with shared validation label: ${EVENT_ID}"
          python scripts/forecast_bundles/write_gate_forecast_rows_v1.py "${args[@]}"

      - name: Run chain readiness validator
        shell: bash
        run: |
          set -euo pipefail
          script="scripts/forecast_bundles/validate_forecast_chain_readiness_v1.py"
          help_text="$(python "$script" --help 2>&1 || true)"
          args=(--event-id "${EVENT_ID}" --gate all --lane all)
          if echo "$help_text" | grep -q -- "--strict"; then
            args+=(--strict false)
          fi
          if [ "${COMMIT_OUTPUTS}" = "true" ] && echo "$help_text" | grep -q -- "--commit-outputs"; then
            args+=(--commit-outputs)
          fi
          echo "Running Readiness Validator with shared validation label: ${EVENT_ID}"
          python "$script" "${args[@]}"

      - name: Run bundle locker
        shell: bash
        run: |
          set -euo pipefail
          script="scripts/forecast_bundles/create_forecast_bundles_v1.py"
          help_text="$(python "$script" --help 2>&1 || true)"
          args=(--event-id "${EVENT_ID}" --race-name "${RACE_NAME}" --gate all)

          if [ "${ALLOW_STRUCTURAL_PLACEHOLDERS}" = "true" ] && echo "$help_text" | grep -q -- "--allow-structural-placeholders"; then
            args+=(--allow-structural-placeholders)
          fi

          if [ "${COMMIT_OUTPUTS}" = "true" ] && echo "$help_text" | grep -q -- "--commit-outputs"; then
            args+=(--commit-outputs)
          fi

          echo "Running Bundle Locker with shared validation label: ${EVENT_ID}"
          python "$script" "${args[@]}"

      - name: Commit one-click validation outputs
        if: ${{ github.event.inputs.commit_outputs == 'true' || github.event.inputs.commit_outputs == '' }}
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          paths=(
            "latest/forecast_outputs/${EVENT_ID}"
            "history/forecast_outputs/${EVENT_ID}"
            "latest/forecast_chain_readiness/${EVENT_ID}"
            "history/forecast_chain_readiness/${EVENT_ID}"
            "latest/forecast_bundles/${EVENT_ID}"
            "history/forecast_bundles/${EVENT_ID}"
            "_runtime"
          )

          added_any=0
          for p in "${paths[@]}"; do
            if [ -e "$p" ]; then
              git add "$p"
              added_any=1
            fi
          done

          if [ "$added_any" = "0" ]; then
            echo "No output paths exist to commit."
            exit 0
          fi

          if git diff --cached --quiet; then
            echo "No forecast chain changes to commit."
            exit 0
          fi

          git commit -m "chore: run one-click forecast chain validation for ${EVENT_ID}"
          git pull --rebase
          git push

      - name: Upload one-click validation artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: f1-forecast-chain-one-click-validation-v1
          path: |
            latest/forecast_outputs/${{ env.EVENT_ID }}/**
            latest/forecast_chain_readiness/${{ env.EVENT_ID }}/**
            latest/forecast_bundles/${{ env.EVENT_ID }}/**
            history/forecast_outputs/${{ env.EVENT_ID }}/**
            history/forecast_chain_readiness/${{ env.EVENT_ID }}/**
            history/forecast_bundles/${{ env.EVENT_ID }}/**
            _runtime/**
          if-no-files-found: ignore
