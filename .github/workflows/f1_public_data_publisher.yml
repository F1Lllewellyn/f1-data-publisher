name: F1 universal auto data publisher

on:
  workflow_dispatch:
    inputs:
      year:
        description: "Season year"
        required: false
        default: "2026"
      sessions:
        description: "Comma-separated sessions"
        required: false
        default: "FP1,FP2,FP3,Q,R"
      event_name:
        description: "Optional manual FastF1/OpenF1 event name override"
        required: false
        default: ""
      country_name:
        description: "Optional manual OpenF1 country name override"
        required: false
        default: ""

  schedule:
    # Permanent race-weekend cadence.
    # UTC, off the top of the hour to reduce GitHub schedule congestion risk.
    # Covers global F1 session timing without weekly edits.
    - cron: "17,47 * * * 4,5,6,0,1"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: f1-public-data-publisher
  cancel-in-progress: false

jobs:
  publish-data:
    runs-on: ubuntu-latest
    timeout-minutes: 50

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Pages
        uses: actions/configure-pages@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run manual/override publisher
        if: github.event_name == 'workflow_dispatch'
        run: |
          python scripts/publish_f1_data.py             --year "${{ inputs.year }}"             --sessions "${{ inputs.sessions }}"             --event-name "${{ inputs.event_name }}"             --country-name "${{ inputs.country_name }}"

      - name: Run scheduled auto publisher
        if: github.event_name == 'schedule'
        run: |
          python scripts/publish_f1_data.py --config config/race_config.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
