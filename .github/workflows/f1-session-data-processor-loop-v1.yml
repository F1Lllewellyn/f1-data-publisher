name: F1 Session Data Processor Loop v1

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'safe_test checks install; run_now processes recent completed session; manifest_audit checks stale manifests.'
        required: false
        default: 'run_now'
        type: choice
        options: [safe_test, run_now, manifest_audit]
      session_filter:
        description: 'Optional. Leave auto, or use practice 1, practice 2, practice 3, qualifying, race.'
        required: false
        default: 'auto'
  schedule:
    # Runs shortly after the existing readiness watchers. Processor exits safely if no completed session is found.
    - cron: '5,20,35,50 * * * 5,6,0'

permissions:
  contents: write
  actions: read

concurrency:
  group: f1-session-data-processor-loop-${{ github.ref }}
  cancel-in-progress: false

jobs:
  session-data-processor:
    runs-on: ubuntu-latest
    env:
      MODE: ${{ github.event_name == 'schedule' && 'run_now' || github.event.inputs.mode || 'run_now' }}
      SESSION_FILTER: ${{ github.event.inputs.session_filter || 'auto' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install processor dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install pandas requests openpyxl
          python - <<'PY'
          import pandas, requests, openpyxl
          print("Session processor dependency preflight passed: pandas, requests, openpyxl")
          PY

      - name: Run session data processor
        shell: bash
        run: |
          set -euo pipefail
          python scripts/session_data_processor/session_data_processor_loop_v1.py \
            --mode "${MODE}" \
            --season 2026 \
            --session-filter "${SESSION_FILTER}"

      - name: Upload session processor artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: f1-session-data-processor-loop-v1
          path: |
            _runtime/session_data_processor/**
            latest/session_data_processor/**
            history/session_data_processor/**
            latest/latest_manifest.json
            latest/data_readiness.json
            latest/combined_source_manifest.json
            latest/forecast_bundle_ledger/session_data_processor/**
            history/forecast_bundle_ledger/session_data_processor/**
          if-no-files-found: ignore

      - name: Commit session processor outputs
        if: ${{ success() }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          candidates=(
            "latest/session_data_processor"
            "history/session_data_processor"
            "latest/latest_manifest.json"
            "latest/data_readiness.json"
            "latest/combined_source_manifest.json"
            "latest/forecast_bundle_ledger/session_data_processor"
            "history/forecast_bundle_ledger/session_data_processor"
          )
          added=0
          for p in "${candidates[@]}"; do
            if [ -e "$p" ]; then
              if git check-ignore -q "$p"; then
                echo "Skipping ignored path: $p"
                continue
              fi
              git add "$p"
              added=1
            fi
          done
          if [ "$added" = "0" ]; then
            echo "No session processor output paths exist to commit."
            exit 0
          fi
          if git diff --cached --quiet; then
            echo "No session processor changes to commit."
            exit 0
          fi
          git commit -m "chore: update session data processor artifacts"
          git push
