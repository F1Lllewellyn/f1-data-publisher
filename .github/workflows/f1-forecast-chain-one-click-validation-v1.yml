name: F1 Forecast Chain One-Click Validation v1

on:
  workflow_dispatch:
    inputs:
      event_id:
        description: 'Validation label. Leave default unless intentionally testing another event.'
        required: false
        default: 'manual_forecast_producer_validation'
      race_name:
        description: 'Human-readable race/test name.'
        required: false
        default: 'Manual Forecast Producer Validation'
      commit_outputs:
        description: 'Commit validation outputs back to the repo.'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      allow_structural_placeholders:
        description: 'Safety guard. Keep false unless explicitly creating structural placeholder bundles.'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write
  actions: read

concurrency:
  group: f1-main-write-serialization
  cancel-in-progress: false

jobs:
  one-click-forecast-chain-validation:
    runs-on: ubuntu-latest
    env:
      EVENT_ID: ${{ github.event.inputs.event_id || 'manual_forecast_producer_validation' }}
      RACE_NAME: ${{ github.event.inputs.race_name || 'Manual Forecast Producer Validation' }}
      COMMIT_OUTPUTS: ${{ github.event.inputs.commit_outputs || 'true' }}
      ALLOW_STRUCTURAL_PLACEHOLDERS: ${{ github.event.inputs.allow_structural_placeholders || 'false' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Preflight workflow and script compatibility
        shell: bash
        run: |
          set -euo pipefail
          echo "Forecast validation label: ${EVENT_ID}"
          echo "Race/test name: ${RACE_NAME}"
          echo "Commit outputs: ${COMMIT_OUTPUTS}"
          echo "Allow structural placeholders: ${ALLOW_STRUCTURAL_PLACEHOLDERS}"

          required_files=(
            "scripts/forecast_bundles/write_gate_forecast_rows_v1.py"
            "scripts/forecast_bundles/validate_forecast_chain_readiness_v1.py"
            "scripts/forecast_bundles/create_forecast_bundles_v1.py"
          )

          missing=0
          mkdir -p _runtime/forecast_chain_one_click
          for f in "${required_files[@]}"; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing required script: $f"
              missing=1
            else
              echo "Found: $f"
              python "$f" --help > "_runtime/forecast_chain_one_click/$(basename "$f").help.txt" 2>&1 || {
                echo "::error::Script help failed for $f"
                cat "_runtime/forecast_chain_one_click/$(basename "$f").help.txt"
                missing=1
              }
            fi
          done

          if [ "$missing" != "0" ]; then
            echo "::error::Preflight failed. No chain steps will run."
            exit 1
          fi

      - name: Run Source Writer
        shell: bash
        run: |
          set -euo pipefail
          echo "Running Source Writer with shared validation label: ${EVENT_ID}"
          python scripts/forecast_bundles/write_gate_forecast_rows_v1.py \
            --event-id "${EVENT_ID}" \
            --gate all \
            --lane all

      - name: Run Readiness Validator
        shell: bash
        run: |
          set -euo pipefail
          echo "Running Readiness Validator with shared validation label: ${EVENT_ID}"
          # NOTE: --strict is a boolean flag in this script. To run non-strict, omit it.
          python scripts/forecast_bundles/validate_forecast_chain_readiness_v1.py \
            --event-id "${EVENT_ID}" \
            --gate all \
            --lane all

      - name: Run Bundle Locker
        shell: bash
        run: |
          set -euo pipefail
          echo "Running Bundle Locker with shared validation label: ${EVENT_ID}"
          args=(
            --event-id "${EVENT_ID}"
            --race-name "${RACE_NAME}"
            --gate all
          )
          # Safety default: do not create structural placeholders unless explicitly requested.
          # This script uses a boolean flag for structural placeholders, so false means omit the flag.
          if [ "${ALLOW_STRUCTURAL_PLACEHOLDERS}" = "true" ]; then
            args+=(--allow-structural-placeholders)
          fi
          python scripts/forecast_bundles/create_forecast_bundles_v1.py "${args[@]}"

      - name: Upload one-click validation artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: f1-forecast-chain-one-click-validation-v1
          path: |
            latest/forecasts/${{ env.EVENT_ID }}/**
            latest/forecast_outputs/${{ env.EVENT_ID }}/**
            latest/forecast_chain_readiness/${{ env.EVENT_ID }}/**
            latest/forecast_bundles/${{ env.EVENT_ID }}/**
            history/forecasts/${{ env.EVENT_ID }}/**
            history/forecast_outputs/${{ env.EVENT_ID }}/**
            history/forecast_chain_readiness/${{ env.EVENT_ID }}/**
            history/forecast_bundles/${{ env.EVENT_ID }}/**
            _runtime/**
          if-no-files-found: ignore

      - name: Commit one-click validation outputs
        if: ${{ success() && env.COMMIT_OUTPUTS == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          candidates=(
            "latest/forecasts/${EVENT_ID}"
            "latest/forecast_outputs/${EVENT_ID}"
            "latest/forecast_chain_readiness/${EVENT_ID}"
            "latest/forecast_bundles/${EVENT_ID}"
            "history/forecasts/${EVENT_ID}"
            "history/forecast_outputs/${EVENT_ID}"
            "history/forecast_chain_readiness/${EVENT_ID}"
            "history/forecast_bundles/${EVENT_ID}"
          )

          added=0
          for p in "${candidates[@]}"; do
            if [ -e "$p" ]; then
              git add "$p"
              added=1
            fi
          done

          if [ "$added" = "0" ]; then
            echo "No forecast chain output paths exist to commit."
            exit 0
          fi

          if git diff --cached --quiet; then
            echo "No forecast chain changes to commit."
            exit 0
          fi

          git commit -m "chore: one-click forecast chain validation outputs (${EVENT_ID})"
          bash scripts/ops/safe_git_push_rebase_retry.sh
