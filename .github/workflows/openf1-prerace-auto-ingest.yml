name: OpenF1 Pre-Race Auto Ingest

on:
  workflow_dispatch:
  schedule:
    - cron: "15 9 * * *"

permissions:
  contents: read
  actions: read

concurrency:
  group: openf1-prerace-auto-${{ github.ref }}
  cancel-in-progress: false

env:
  YEAR: "2026"
  MODE: "prerace"
  FETCH_MODE: "driver_full_session"
  OUTPUT_DIR: "output/openf1_prerace_auto"
  CHECKPOINT_ARTIFACT: "openf1-prerace-auto-checkpoint"
  FINAL_ARTIFACT: "openf1-prerace-auto-final"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  extract_and_checkpoint:
    name: Extract OpenF1 data and upload checkpoint
    runs-on: ubuntu-latest
    timeout-minutes: 360
    outputs:
      deferred: ${{ steps.extract.outputs.deferred }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas pyarrow tqdm python-dateutil numpy tabulate

      - name: Extract and build checkpoint with live-session defer guard
        id: extract
        shell: bash
        run: |
          set -o pipefail
          mkdir -p latest/legacy_workflow_hardening
          LOG="latest/legacy_workflow_hardening/openf1_prerace_extract.log"
          python scripts/openf1/openf1_high_frequency_extract_checkpoint.py \
            --year "$YEAR" \
            --mode "$MODE" \
            --fetch-mode "$FETCH_MODE" \
            --output-dir "$OUTPUT_DIR" \
            --request-sleep 0.35 \
            --warning-threshold 0.80 \
            --strict-threshold 0.90 2>&1 | tee "$LOG"
          status=${PIPESTATUS[0]}
          if [ "$status" -eq 0 ]; then
            echo "deferred=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          python scripts/ops/f1_openf1_live_restriction_guard_v27.py \
            --repo-root . \
            --log "$LOG" \
            --workflow-name "OpenF1 Pre-Race Auto Ingest" \
            --github-run-id "$GITHUB_RUN_ID"
          guard_status=$?
          if [ "$guard_status" -eq 0 ]; then
            echo "deferred=true" >> "$GITHUB_OUTPUT"
            echo "OpenF1 prereace ingest deferred because live-session unauthenticated API access is restricted."
            exit 0
          fi
          echo "deferred=false" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Upload extraction checkpoint artifact
        uses: actions/upload-artifact@v6
        if: ${{ steps.extract.outputs.deferred != 'true' }}
        with:
          name: ${{ env.CHECKPOINT_ARTIFACT }}-${{ env.YEAR }}-${{ github.run_number }}
          path: ${{ env.OUTPUT_DIR }}
          retention-days: 60
          if-no-files-found: error

      - name: Upload live-session defer diagnostics
        uses: actions/upload-artifact@v6
        if: ${{ steps.extract.outputs.deferred == 'true' }}
        with:
          name: openf1-prerace-live-session-deferred-${{ env.YEAR }}-${{ github.run_number }}
          path: latest/legacy_workflow_hardening/**
          retention-days: 14
          if-no-files-found: ignore

  validate_report_and_upload:
    name: Validate checkpoint, write report, upload final artifact
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: extract_and_checkpoint
    if: ${{ needs.extract_and_checkpoint.outputs.deferred != 'true' }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas pyarrow tqdm python-dateutil numpy tabulate

      - name: Download extraction checkpoint artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.CHECKPOINT_ARTIFACT }}-${{ env.YEAR }}-${{ github.run_number }}
          path: ${{ env.OUTPUT_DIR }}

      - name: Write report without re-extracting
        run: |
          python scripts/openf1/openf1_high_frequency_report_only.py \
            --year "$YEAR" \
            --mode "$MODE" \
            --output-dir "$OUTPUT_DIR" \
            --workflow-label "OpenF1 Pre-Race Auto Ingest"

      - name: Validate output
        run: |
          python tests/validate_openf1_high_frequency_output.py \
            --output-dir "$OUTPUT_DIR" \
            --mode "$MODE"

      - name: Add run summary
        if: always()
        run: |
          if [ -f "$OUTPUT_DIR/reports/github_step_summary.md" ]; then
            cat "$OUTPUT_DIR/reports/github_step_summary.md" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload final validated artifact
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: ${{ env.FINAL_ARTIFACT }}-${{ env.YEAR }}-${{ github.run_number }}
          path: ${{ env.OUTPUT_DIR }}
          retention-days: 60
          if-no-files-found: error
