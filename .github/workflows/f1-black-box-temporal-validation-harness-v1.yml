name: F1 Black-Box Temporal Validation Harness v1

on:
  workflow_dispatch:
    inputs:
      event_id:
        description: "Event/session id label"
        required: true
        default: "manual_black_box_validation"
      commit_outputs:
        description: "Commit outputs back to repository"
        required: true
        type: boolean
        default: true

permissions:
  contents: write

env:
  PYTHONUNBUFFERED: "1"

jobs:
  black_box_temporal_validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas
      - name: Run black-box temporal validation harness
        run: |
          python scripts/validation/run_black_box_temporal_validation_v1.py --repo-root . --event-id "${{ github.event.inputs.event_id }}" --out-dir "latest/black_box_temporal_validation/${{ github.event.inputs.event_id }}"
      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: f1-black-box-temporal-validation
          path: latest/black_box_temporal_validation/${{ github.event.inputs.event_id }}/
      - name: Commit outputs
        if: ${{ github.event.inputs.commit_outputs == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add latest/black_box_temporal_validation/${{ github.event.inputs.event_id }}/
          if git diff --cached --quiet; then
            echo "No black-box validation changes to commit."
          else
            git commit -m "Add black-box temporal validation outputs for ${{ github.event.inputs.event_id }}"
            git push
          fi

