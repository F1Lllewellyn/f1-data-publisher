name: F1 1B Output Contract After Control Room v22

on:
  workflow_dispatch:
    inputs:
      commit_outputs:
        description: "Commit generated 1B output-contract artifacts"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  workflow_run:
    workflows:
      - "F1 Peak Elite Control Room - One Click v1"
    types:
      - completed

permissions:
  contents: write
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: f1-1b-output-contract-after-control-room-v22-${{ github.ref }}
  cancel-in-progress: false

jobs:
  output-contract-after-control-room:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository latest main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Print trigger context
        shell: bash
        run: |
          set -euo pipefail
          echo "event_name=${GITHUB_EVENT_NAME}"
          echo "workflow_ref=${GITHUB_WORKFLOW_REF}"
          echo "sha=${GITHUB_SHA}"
          mkdir -p latest/1b_output_contract
          python - <<'PY'
          import json, os, pathlib
          event_path = os.environ.get('GITHUB_EVENT_PATH')
          event = {}
          if event_path and pathlib.Path(event_path).exists():
              event = json.loads(pathlib.Path(event_path).read_text(encoding='utf-8'))
          workflow_run = event.get('workflow_run') or {}
          report = {
              'bridge_version': 'v22',
              'event_name': os.environ.get('GITHUB_EVENT_NAME'),
              'triggering_workflow_name': workflow_run.get('name'),
              'triggering_workflow_conclusion': workflow_run.get('conclusion'),
              'triggering_workflow_head_branch': workflow_run.get('head_branch'),
              'triggering_workflow_head_sha': workflow_run.get('head_sha'),
              'checkout_ref': 'main',
              'run_forecast_gate': False,
              'promotion_allowed': False,
              'stable_engine_modified': False,
              'canonical_workbook_overwrite': False,
              'purpose': 'Automatically run 1B output-contract ledger/handoff after a successful Control Room chain.'
          }
          pathlib.Path('latest/1b_output_contract/control_room_bridge_v22_trigger_report.json').write_text(json.dumps(report, indent=2, sort_keys=True) + '\n', encoding='utf-8')
          print(json.dumps(report, indent=2, sort_keys=True))
          PY

      - name: Run output-contract acceptance tests
        shell: bash
        run: |
          set -euo pipefail
          python scripts/ops/f1_1b_v16_acceptance_tests_v1.py --repo-root .

      - name: Run output contract ledger and handoff
        shell: bash
        run: |
          set -euo pipefail
          python scripts/session_data_processor/f1_1b_output_contract_v16.py --repo-root . --mode run_now

      - name: Write bridge completion marker
        shell: bash
        if: always()
        run: |
          set -euo pipefail
          mkdir -p latest/1b_output_contract
          python - <<'PY'
          import json, pathlib, os, datetime
          path = pathlib.Path('latest/1b_output_contract/control_room_bridge_v22_completion_report.json')
          report = {
              'bridge_version': 'v22',
              'completed_utc': datetime.datetime.utcnow().replace(microsecond=0).isoformat() + 'Z',
              'github_workflow': os.environ.get('GITHUB_WORKFLOW'),
              'github_run_id': os.environ.get('GITHUB_RUN_ID'),
              'run_forecast_gate': False,
              'promotion_allowed': False,
              'stable_engine_modified': False,
              'canonical_workbook_overwrite': False
          }
          path.write_text(json.dumps(report, indent=2, sort_keys=True) + '\n', encoding='utf-8')
          print(json.dumps(report, indent=2, sort_keys=True))
          PY

      - name: Upload v22 bridge diagnostics
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: f1-1b-control-room-output-contract-bridge-v22-diagnostics
          path: |
            latest/1b_output_contract/**
            latest/1b_validation/**
            latest/forecast_bundle_ledger/**
            latest/material_change/**
            latest/readiness_handoff/**
            latest/last_good_state.json
            history/forecast_bundle_ledger/**
          if-no-files-found: ignore

      - name: Commit v22 output-contract artifacts
        if: ${{ github.event_name == 'workflow_run' || github.event.inputs.commit_outputs == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          rm -rf scripts/**/__pycache__ || true
          find . -path ./.git -prune -o -type f \( -name "*.pyc" -o -name "*.pyo" -o -name "*.pyd" \) -print | xargs -r rm -f
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for p in \
            latest/forecast_bundle_ledger \
            latest/readiness_handoff \
            latest/material_change \
            latest/1b_output_contract \
            latest/1b_validation \
            history/forecast_bundle_ledger \
            latest/last_good_state.json
          do
            if [ -e "$p" ]; then
              git add "$p"
            else
              echo "Optional output not present, skipping: $p"
            fi
          done
          if git diff --cached --quiet; then
            echo "No v22 output-contract bridge changes to commit."
          else
            git commit -m "chore: update 1B output contract bridge artifacts v22"
            bash scripts/ops/safe_git_push_rebase_retry.sh
          fi
