name: F1 1B Output Contract After Control Room v22

on:
  workflow_dispatch:
    inputs:
      commit_outputs:
        description: "Commit generated 1B output-contract artifacts"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  workflow_run:
    workflows:
      - "F1 Peak Elite Control Room - One Click v1"
    types:
      - completed

permissions:
  contents: write
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: f1-1b-output-contract-after-control-room-v22-${{ github.ref }}
  cancel-in-progress: false

jobs:
  output-contract-after-control-room:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository latest main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Write bridge trigger report
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p latest/1b_output_contract
          {
            echo "{"
            echo "  \"bridge_version\": \"v25\","
            echo "  \"event_name\": \"${GITHUB_EVENT_NAME}\","
            echo "  \"github_workflow\": \"${GITHUB_WORKFLOW}\","
            echo "  \"github_run_id\": \"${GITHUB_RUN_ID}\","
            echo "  \"checkout_ref\": \"main\","
            echo "  \"run_forecast_gate\": false,"
            echo "  \"promotion_allowed\": false,"
            echo "  \"stable_engine_modified\": false,"
            echo "  \"canonical_workbook_overwrite\": false,"
            echo "  \"purpose\": \"Run 1B output-contract ledger, downstream handoff, context publisher, and trigger governor after Control Room success.\""
            echo "}"
          } > latest/1b_output_contract/control_room_bridge_v25_trigger_report.json
          cat latest/1b_output_contract/control_room_bridge_v25_trigger_report.json

      - name: Run workbook persistence handoff static guard
        shell: bash
        run: |
          set -euo pipefail
          python scripts/ops/f1_workbook_persistence_handoff_guard_v1.py --repo-root . --mode static --fail-on-issue

      - name: Run output-contract acceptance tests
        shell: bash
        run: |
          set -euo pipefail
          python scripts/ops/f1_1b_v16_acceptance_tests_v1.py --repo-root .

      - name: Run output contract ledger and handoff
        shell: bash
        run: |
          set -euo pipefail
          python scripts/session_data_processor/f1_1b_output_contract_v16.py --repo-root . --mode run_now

      - name: Run v24 downstream consumer acceptance tests
        shell: bash
        run: |
          set -euo pipefail
          python scripts/ops/f1_1b_v24_acceptance_tests_v1.py --repo-root .

      - name: Run v24 downstream consumer handoff writer
        shell: bash
        run: |
          set -euo pipefail
          python scripts/session_data_processor/f1_1b_downstream_consumer_handoff_v24.py --repo-root . --mode run_now

      - name: Run v25 consumer context acceptance tests
        shell: bash
        run: |
          set -euo pipefail
          python scripts/ops/f1_1b_v25_acceptance_tests_v1.py --repo-root .

      - name: Run v25 consumer context publisher and trigger governor
        shell: bash
        run: |
          set -euo pipefail
          python scripts/session_data_processor/f1_1b_consumer_context_publisher_v25.py --repo-root . --mode run_now

      - name: Write bridge completion marker
        shell: bash
        if: always()
        run: |
          set -euo pipefail
          mkdir -p latest/1b_output_contract
          {
            echo "{"
            echo "  \"bridge_version\": \"v25\","
            echo "  \"completed_utc\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\","
            echo "  \"github_workflow\": \"${GITHUB_WORKFLOW}\","
            echo "  \"github_run_id\": \"${GITHUB_RUN_ID}\","
            echo "  \"run_forecast_gate\": false,"
            echo "  \"promotion_allowed\": false,"
            echo "  \"stable_engine_modified\": false,"
            echo "  \"canonical_workbook_overwrite\": false"
            echo "}"
          } > latest/1b_output_contract/control_room_bridge_v25_completion_report.json
          cat latest/1b_output_contract/control_room_bridge_v25_completion_report.json

      - name: Upload v25 bridge/context diagnostics
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: f1-1b-control-room-output-contract-context-v26-diagnostics
          path: |
            latest/1b_output_contract/**
            latest/1b_validation/**
            latest/session_data_processor/**
            history/session_data_processor/**
            latest/workbook_kpi_refresh_applier/**
            history/workbook_kpi_refresh_applier/**
            latest/readiness_dashboards/**
            history/readiness_dashboards/**
            latest/forecast_bundle_ledger/**
            latest/material_change/**
            latest/readiness_handoff/**
            latest/last_good_state.json
            latest/downstream_consumers/**
            latest/chat_context/**
            latest/consumer_trigger_governor/**
            latest/notification_routing/**
            history/forecast_bundle_ledger/**
            history/downstream_consumers/**
            history/chat_context/**
            history/consumer_trigger_governor/**
            history/notification_routing/**
          if-no-files-found: ignore

      - name: Commit v25 output-contract bridge, downstream, context, and trigger artifacts
        if: ${{ github.event_name == 'workflow_run' || github.event.inputs.commit_outputs == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          rm -rf scripts/**/__pycache__ || true
          find . -path ./.git -prune -o -type f \( -name "*.pyc" -o -name "*.pyo" -o -name "*.pyd" \) -print | xargs -r rm -f
          PROTECTED_PATTERN='Engine_2026-06-07_STABLE|F1_2026_Prediction_Model_Data_Workbook\.xlsx|F1_2026_Prediction_Model_Data_Workbook_updated_2026-06-06_v15_fastf1_kpi_integrated\.xlsx'
          if git status --porcelain | grep -E "$PROTECTED_PATTERN"; then
            echo "Protected stable engine or canonical workbook touched. Blocking commit."
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for p in \
            latest/session_data_processor \
            history/session_data_processor \
            latest/workbook_kpi_refresh_applier \
            history/workbook_kpi_refresh_applier \
            latest/readiness_dashboards \
            history/readiness_dashboards \
            latest/forecast_bundle_ledger \
            latest/readiness_handoff \
            latest/material_change \
            latest/1b_output_contract \
            latest/1b_validation \
            latest/downstream_consumers \
            latest/chat_context \
            latest/consumer_trigger_governor \
            latest/notification_routing \
            history/forecast_bundle_ledger \
            history/downstream_consumers \
            history/chat_context \
            history/consumer_trigger_governor \
            history/notification_routing \
            latest/last_good_state.json
          do
            if [ -e "$p" ]; then
              git add "$p"
            else
              echo "Optional output not present, skipping: $p"
            fi
          done
          for root in latest/workbook_kpi_refresh_applier history/workbook_kpi_refresh_applier; do
            if [ -d "$root" ]; then
              while IFS= read -r -d '' f; do
                case "$f" in
                  *F1_2026_Prediction_Model_Data_Workbook.xlsx|*F1_2026_Prediction_Model_Data_Workbook_updated_2026-06-06_v15_fastf1_kpi_integrated.xlsx|*Engine_2026-06-07_STABLE*)
                    echo "Skipping protected artifact candidate: $f"
                    ;;
                  *)
                    git add -f "$f"
                    ;;
                esac
              done < <(find "$root" -type f \( -name 'F1_Workbook_KPI_SANDBOX_*.xlsx' -o -name '*.json' -o -name '*.csv' -o -name '*.md' \) -print0)
            fi
          done
          if git diff --cached --name-only | grep -E "$PROTECTED_PATTERN"; then
            echo "Protected stable engine or canonical workbook entered the staged set. Blocking commit."
            git reset
            exit 1
          fi
          if git diff --cached --quiet; then
            echo "No v25 output-contract/downstream/context bridge changes to commit."
          else
            git commit -m "chore: update 1B consumer context, trigger, and workbook persistence artifacts v26"
            bash scripts/ops/safe_git_push_rebase_retry.sh
          fi
