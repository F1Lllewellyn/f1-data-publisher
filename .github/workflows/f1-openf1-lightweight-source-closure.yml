name: F1 OpenF1 Lightweight Source Closure

on:
  workflow_dispatch:
    inputs:
      season:
        description: 'F1 season year'
        required: true
        default: '2026'
      completed_only:
        description: 'Only retrieve completed sessions'
        required: true
        default: 'true'
  schedule:
    # Lightweight only. Runs after common race-weekend session windows.
    - cron: '20 12 * * 5'
    - cron: '20 17 * * 5'
    - cron: '20 12 * * 6'
    - cron: '20 17 * * 6'
    - cron: '20 18 * * 0'

permissions:
  contents: write
  actions: read

jobs:
  openf1-lightweight-source-closure:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pandas requests openpyxl

      - name: Run lightweight OpenF1 source closure publisher
        run: |
          python scripts/openf1/publish_openf1_lightweight_source_closure.py --season "${{ github.event.inputs.season || '2026' }}" --completed-only "${{ github.event.inputs.completed_only || 'true' }}"

      - name: Upload source closure artifact
        uses: actions/upload-artifact@v6
        with:
          name: openf1-lightweight-source-closure
          path: |
            latest/openf1_lightweight_source_closure/**
          retention-days: 30

      - name: Commit source closure outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add latest/openf1_lightweight_source_closure history/openf1_lightweight_source_closure || true
          if git diff --cached --quiet; then
            echo "No source-closure changes to commit."
          else
            git commit -m "Update OpenF1 lightweight source closure artifacts"
            git push
          fi

