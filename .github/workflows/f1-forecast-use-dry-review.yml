name: F1 Forecast Use Dry Review

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["F1 Dry Forecast Cycle", "Elite Weekend Engine Run"]
    types: [completed]

permissions:
  contents: read
  actions: read

env:
  OUTPUT_DIR: "output/f1_forecast_use_dry_review"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  forecast_use_dry_review:
    name: Build forecast-use dry review package
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests pyarrow numpy python-dateutil tabulate

      - name: Download latest Elite artifact
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/elite/download_latest_elite_artifact.py \
            --output-dir "$OUTPUT_DIR"

      - name: Build forecast-use dry review
        run: |
          python scripts/forecast/build_forecast_use_dry_review.py \
            --elite-artifact-dir "$OUTPUT_DIR/elite_artifact" \
            --policy configs/forecast/forecast_review_policy.json \
            --output-dir "$OUTPUT_DIR"

      - name: Add run summary
        run: |
          cat "$OUTPUT_DIR/reports/github_step_summary.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload forecast-use dry review artifact
        uses: actions/upload-artifact@v6
        with:
          name: f1-forecast-use-dry-review-2026-${{ github.run_number }}
          path: ${{ env.OUTPUT_DIR }}
          retention-days: 90
          if-no-files-found: error

