name: F1 1B Output Contract v16

on:
  workflow_dispatch:
    inputs:
      commit_outputs:
        description: "Commit generated 1B output-contract artifacts"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write

concurrency:
  group: f1-1b-output-contract-v16-${{ github.ref }}
  cancel-in-progress: false

jobs:
  output-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v20 acceptance tests
        shell: bash
        run: |
          set -euo pipefail
          python scripts/ops/f1_1b_v16_acceptance_tests_v1.py --repo-root .

      - name: Run v20 output contract
        shell: bash
        run: |
          set -euo pipefail
          python scripts/session_data_processor/f1_1b_output_contract_v16.py --repo-root . --mode run_now

      - name: Upload v20 diagnostics
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: f1-1b-output-contract-v20-diagnostics
          path: |
            latest/1b_output_contract/**
            latest/1b_validation/**
            latest/forecast_bundle_ledger/**
            latest/material_change/**
            latest/readiness_handoff/**
            latest/last_good_state.json
            history/forecast_bundle_ledger/**
          if-no-files-found: ignore

      - name: Commit v20 output-contract artifacts
        if: ${{ github.event.inputs.commit_outputs == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          rm -rf scripts/**/__pycache__ || true
          find . -path ./.git -prune -o -type f \( -name "*.pyc" -o -name "*.pyo" -o -name "*.pyd" \) -print | xargs -r rm -f
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for p in \
            latest/forecast_bundle_ledger \
            latest/readiness_handoff \
            latest/material_change \
            latest/1b_output_contract \
            latest/1b_validation \
            history/forecast_bundle_ledger \
            latest/last_good_state.json
          do
            if [ -e "$p" ]; then
              git add "$p"
            else
              echo "Optional output not present, skipping: $p"
            fi
          done
          if git diff --cached --quiet; then
            echo "No v20 output-contract changes to commit."
          else
            git commit -m "chore: update 1B output contract artifacts v20"
            bash scripts/ops/safe_git_push_rebase_retry.sh
          fi
