name: F1 Peak Elite Control Room - One Click v1

on:
  workflow_dispatch:
    inputs:
      operation:
        description: 'Operation to run'
        required: true
        default: 'full_safe_chain'
        type: choice
        options:
          - health_only
          - syntax_repair_only
          - full_safe_chain
          - full_run_chain
          - scheduled_monitor
      commit_outputs:
        description: 'Commit repaired workflows/status outputs when safe'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      run_forecast_gate:
        description: 'Also run forecast gate chain during full_run_chain'
        required: true
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
  schedule:
    - cron: '9,39 * * * *'

permissions:
  contents: write
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: f1-main-write-serialization
  cancel-in-progress: false

jobs:
  peak-elite-control-room:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install pandas requests openpyxl

      - name: Verify workbook persistence workflow wiring
        shell: bash
        run: |
          set -euo pipefail
          python scripts/ops/f1_workbook_persistence_handoff_guard_v1.py --repo-root "$GITHUB_WORKSPACE" --mode static --fail-on-issue

      - name: Write v27 scheduled session-gate decision
        shell: bash
        run: |
          set -euo pipefail
          python scripts/ops/f1_canonical_chain_guard_v27.py \
            --repo-root "$GITHUB_WORKSPACE" \
            --mode scheduled_gate \
            --workflow-name "F1 Peak Elite Control Room - One Click v1" \
            --recent-minutes 20

      - name: Run peak-elite orchestrator
        shell: bash
        run: |
          set -euo pipefail
          OPERATION="${{ inputs.operation }}"
          COMMIT_OUTPUTS="${{ inputs.commit_outputs }}"
          RUN_FORECAST_GATE="${{ inputs.run_forecast_gate }}"
          if [ -z "${OPERATION:-}" ]; then
            if [ "${GITHUB_EVENT_NAME:-}" = "schedule" ]; then
              OPERATION="full_run_chain"
            else
              OPERATION="scheduled_monitor"
            fi
          fi
          if [ -z "${COMMIT_OUTPUTS:-}" ]; then
            COMMIT_OUTPUTS="true"
          fi
          if [ -z "${RUN_FORECAST_GATE:-}" ]; then
            RUN_FORECAST_GATE="false"
          fi
          echo "operation=$OPERATION"
          echo "commit_outputs=$COMMIT_OUTPUTS"
          echo "run_forecast_gate=$RUN_FORECAST_GATE"
          python scripts/ops/f1_peak_elite_orchestrator_v1.py \
            --repo-root "$GITHUB_WORKSPACE" \
            --operation "$OPERATION" \
            --season 2026 \
            --session-filter auto \
            --run-forecast-gate "$RUN_FORECAST_GATE"

      - name: Verify workbook/session persistence handoff
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          python scripts/ops/f1_workbook_persistence_handoff_guard_v1.py --repo-root "$GITHUB_WORKSPACE" --mode runtime --fail-on-issue

      - name: Run v27 static acceptance checks
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          python scripts/ops/f1_1b_v27_legacy_collision_hardening_acceptance_tests.py --repo-root "$GITHUB_WORKSPACE"

      - name: Upload peak-elite diagnostics and refreshed workbook handoff artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: f1-peak-elite-control-room-runtime
          path: |
            _runtime/peak_elite/**
            _runtime/repo_canonicalization/**
            _runtime/session_data_processor/**
            _runtime/workbook_kpi_refresh_applier/**
            _runtime/dashboard_connector/**
            _runtime/autorepair/session_workbook_recovery/**
            latest/peak_elite/**
            latest/repo_canonicalization/**
            latest/session_data_processor/**
            history/session_data_processor/**
            latest/workbook_kpi_refresh_applier/**
            history/workbook_kpi_refresh_applier/**
            latest/readiness_dashboards/**
            history/readiness_dashboards/**
            latest/chat_context/**
            history/chat_context/**
            latest/forecast_bundle_ledger/session_data_processor/**
            history/forecast_bundle_ledger/session_data_processor/**
            latest/session_gate_watch_v27/**
            history/session_gate_watch_v27/**
            latest/legacy_workflow_hardening/**
            latest/1b_validation/**
          if-no-files-found: ignore

      - name: Commit safe repaired workflows, status outputs, and refreshed workbook handoff artifacts
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          COMMIT_OUTPUTS="${{ inputs.commit_outputs }}"
          if [ -z "${COMMIT_OUTPUTS:-}" ]; then
            COMMIT_OUTPUTS="true"
          fi
          if [ "$COMMIT_OUTPUTS" != "true" ]; then
            echo "Commit disabled by workflow input."
            exit 0
          fi

          PROTECTED_PATTERN='Engine_2026-06-07_STABLE|F1_2026_Prediction_Model_Data_Workbook\.xlsx|F1_2026_Prediction_Model_Data_Workbook_updated_2026-06-06_v15_fastf1_kpi_integrated\.xlsx'
          if git status --porcelain | grep -E "$PROTECTED_PATTERN"; then
            echo "Protected stable engine or canonical workbook touched. Blocking commit."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          echo "Removing generated Python cache files before staging."
          find . -type d -name .git -prune -o -type d -name "__pycache__" -print -exec rm -rf {} + || true
          find . -type d -name .git -prune -o -type f \( -name "*.pyc" -o -name "*.pyo" -o -name "*.pyd" \) -print -exec rm -f {} + || true
          CACHE_TRACKED="$(git ls-files | grep -E '(^|/)__pycache__/|\.py[co]$|\.pyd$' || true)"
          if [ -n "$CACHE_TRACKED" ]; then
            echo "$CACHE_TRACKED" | while IFS= read -r f; do
              git rm --cached --ignore-unmatch "$f" || true
            done
          fi

          candidates=(
            ".gitignore"
            ".github/workflows"
            "scripts/ops"
            "scripts/session_data_processor"
            "scripts/workbook_kpi_refresh"
            "scripts/dashboard_connector"
            "configs/peak_elite"
            "configs/session_data_processor"
            "docs/F1_PEAK_ELITE_SYSTEM_2026-06-13.md"
            "docs/F1_REPO_CANONICALIZATION_AND_SOURCE_CLASSIFIER_2026-06-13.md"
            "latest/peak_elite"
            "latest/repo_canonicalization"
            "latest/session_data_processor"
            "history/session_data_processor"
            "latest/workbook_kpi_refresh_applier"
            "history/workbook_kpi_refresh_applier"
            "latest/readiness_dashboards"
            "history/readiness_dashboards"
            "latest/chat_context"
            "history/chat_context"
            "latest/forecast_bundle_ledger/session_data_processor"
            "history/forecast_bundle_ledger/session_data_processor"
            "latest/session_gate_watch_v27"
            "history/session_gate_watch_v27"
            "latest/legacy_workflow_hardening"
            "latest/1b_validation"
          )

          added=0
          for p in "${candidates[@]}"; do
            if [ -e "$p" ]; then
              if git check-ignore -q "$p"; then
                echo "Skipping ignored path: $p"
                continue
              fi
              git add "$p"
              added=1
            fi
          done

          for root in latest/workbook_kpi_refresh_applier history/workbook_kpi_refresh_applier; do
            if [ -d "$root" ]; then
              while IFS= read -r -d '' f; do
                case "$f" in
                  *F1_2026_Prediction_Model_Data_Workbook.xlsx|*F1_2026_Prediction_Model_Data_Workbook_updated_2026-06-06_v15_fastf1_kpi_integrated.xlsx|*Engine_2026-06-07_STABLE*)
                    echo "Skipping protected artifact candidate: $f"
                    ;;
                  *)
                    git add -f "$f"
                    added=1
                    ;;
                esac
              done < <(find "$root" -type f \( -name 'F1_Workbook_KPI_SANDBOX_*.xlsx' -o -name '*.json' -o -name '*.csv' -o -name '*.md' \) -print0)
            fi
          done

          if git diff --cached --name-only | grep -E "$PROTECTED_PATTERN"; then
            echo "Protected stable engine or canonical workbook entered the staged set. Blocking commit."
            git reset
            exit 1
          fi

          if [ "$added" = "0" ]; then
            echo "No peak-elite/workbook handoff output paths exist to commit."
            exit 0
          fi
          if git diff --cached --quiet; then
            echo "No peak-elite/workbook handoff changes to commit."
          else
            git commit -m "chore: persist source-backed workbook KPI handoff artifacts"
            bash scripts/ops/safe_git_push_rebase_retry.sh
          fi
