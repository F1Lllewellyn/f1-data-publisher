name: F1 Live Source Feed Capture Experimental

on:
  workflow_dispatch:
    inputs:
      capture_mode:
        description: "manual or auto_window"
        required: true
        default: "manual"
        type: choice
        options:
          - manual
          - auto_window
      duration_minutes:
        description: "Manual capture duration in minutes. Use 2 for validation; longer windows only during live sessions."
        required: false
        default: "2"
      session_label:
        description: "Optional label, e.g. Barcelona_Race_Test"
        required: false
        default: "manual_test"
      manual_validation_mode:
        description: "For manual tests: infrastructure_only avoids live feed connection; force_source_feed attempts FastF1 stream"
        required: true
        default: "infrastructure_only"
        type: choice
        options:
          - infrastructure_only
          - force_source_feed
      commit_outputs:
        description: "Commit latest/history outputs back to repo"
        required: true
        default: true
        type: boolean
  schedule:
    # Experimental watchdog. Script exits quickly unless policy allows a capture window.
    # Correct GitHub cron format: minute hour day-of-month month day-of-week.
    - cron: "*/15 * * * 5,6,0"

permissions:
  contents: write

env:
  LIVE_CAPTURE_POLICY: configs/live_capture/live_source_feed_capture_policy.json

concurrency:
  group: f1-main-write-serialization
  cancel-in-progress: false

jobs:
  live-source-feed-capture:
    name: live-source-feed-capture-experimental
    runs-on: ubuntu-latest
    timeout-minutes: 240
    concurrency:
      group: f1-live-source-feed-capture-${{ github.ref }}-${{ github.run_id }}
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.9 for FastF1 live timing compatibility
        uses: actions/setup-python@v6
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # FastF1 3.7+ can expose Python 3.10-style type syntax that fails under Python 3.9.
          # The live timing layer deliberately runs on Python 3.9 for SignalRClient compatibility,
          # so pin FastF1 below 3.7 until the live module is validated on a newer Python runtime.
          pip install "fastf1>=3.3,<3.7" pandas requests python-dateutil
          python - <<'PY'
          import sys
          import importlib.metadata as md
          print("Python:", sys.version)
          print("FastF1:", md.version("fastf1"))
          PY

      - name: Run live source feed capture layer
        run: |
          echo "Manual validation mode: ${{ github.event.inputs.manual_validation_mode || 'infrastructure_only' }}"
          python scripts/live_capture/run_live_source_feed_capture.py             --policy "$LIVE_CAPTURE_POLICY"             --capture-mode "${{ github.event.inputs.capture_mode || 'auto_window' }}"             --duration-minutes "${{ github.event.inputs.duration_minutes || '' }}"             --session-label "${{ github.event.inputs.session_label || '' }}"             --github-run-id "${{ github.run_id }}"             --github-run-attempt "${{ github.run_attempt }}"             --manual-validation-mode "${{ github.event.inputs.manual_validation_mode || 'infrastructure_only' }}"

      - name: Upload live source feed artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: f1-live-source-feed-capture-experimental
          path: |
            latest/live_source_feed_capture/**
            history/live_source_feed_capture/**
          if-no-files-found: warn
          retention-days: 30

      - name: Commit live source feed outputs
        if: ${{ always() && (github.event.inputs.commit_outputs == 'true' || github.event_name == 'schedule') }}
        run: |
          if [ -d "latest/live_source_feed_capture" ] || [ -d "history/live_source_feed_capture" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add latest/live_source_feed_capture history/live_source_feed_capture || true
            if ! git diff --cached --quiet; then
              git commit -m "Add live source feed capture outputs"
              bash scripts/ops/safe_git_push_rebase_retry.sh
              echo "No live source feed output changes to commit."
            fi
          else
            echo "No live source feed output folders found."
          fi


