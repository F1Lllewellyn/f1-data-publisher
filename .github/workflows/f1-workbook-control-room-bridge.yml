name: F1 Workbook Control Room Bridge

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Elite Weekend Engine Run"]
    types: [completed]

permissions:
  contents: read
  actions: read

env:
  OUTPUT_DIR: "output/f1_workbook_control_room_bridge"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  workbook_bridge:
    name: Build workbook bridge from latest Elite artifact
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests pyarrow numpy python-dateutil tabulate

      - name: Download latest Elite artifact
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/elite/download_latest_elite_artifact.py \
            --output-dir "$OUTPUT_DIR"

      - name: Build workbook bridge package
        run: |
          python scripts/workbook/build_workbook_control_room_bridge.py \
            --elite-artifact-dir "$OUTPUT_DIR/elite_artifact" \
            --output-dir "$OUTPUT_DIR"

      - name: Add run summary
        run: |
          cat "$OUTPUT_DIR/workbook_control_room_bridge/workbook_control_room_bridge_report.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload workbook bridge artifact
        uses: actions/upload-artifact@v6
        with:
          name: f1-workbook-control-room-bridge-2026-${{ github.run_number }}
          path: ${{ env.OUTPUT_DIR }}/workbook_control_room_bridge
          retention-days: 90
          if-no-files-found: error

