name: F1 Forecast Gate Source Writer v1

on:
  workflow_dispatch:
    inputs:
      event_id:
        description: "Forecast run label. Default matches the producer validation output."
        required: false
        default: "manual_forecast_producer_validation"
      gate:
        description: "Gate to write: all, pre_weekend, post_fp3, post_qualifying, race_result, post_event"
        required: false
        default: "all"
      lane:
        description: "Engine lane: all, stable_baseline, control_room_overlay, experimental_challenger"
        required: false
        default: "all"
      commit_outputs:
        description: "Commit outputs to the repo"
        required: false
        default: "true"

permissions:
  contents: write
  actions: read

jobs:
  write-gate-forecast-rows:
    runs-on: ubuntu-latest
    env:
      EVENT_ID: ${{ github.event.inputs.event_id || 'manual_forecast_producer_validation' }}
      GATE: ${{ github.event.inputs.gate || 'all' }}
      LANE: ${{ github.event.inputs.lane || 'all' }}
      COMMIT_OUTPUTS: ${{ github.event.inputs.commit_outputs || 'true' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Show event context
        run: |
          echo "Forecast event label: ${EVENT_ID}"
          echo "Gate: ${GATE}"
          echo "Lane: ${LANE}"

      - name: Run forecast gate source writer
        run: |
          args=(--event-id "${EVENT_ID}" --gate "${GATE}" --lane "${LANE}")
          if [ "${COMMIT_OUTPUTS}" = "true" ]; then
            args+=(--commit-outputs)
          fi
          python scripts/forecast_bundles/write_gate_forecast_rows_v1.py "${args[@]}"

      - name: Upload source-writer artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: f1-forecast-gate-source-writer-v1
          path: |
            latest/forecast_outputs/${{ env.EVENT_ID }}/**
            history/forecast_outputs/${{ env.EVENT_ID }}/**
            _runtime/**
          if-no-files-found: ignore

      - name: Commit outputs
        if: ${{ env.COMMIT_OUTPUTS == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          paths=()
          [ -d "latest/forecast_outputs/${EVENT_ID}" ] && paths+=("latest/forecast_outputs/${EVENT_ID}")
          [ -d "history/forecast_outputs/${EVENT_ID}" ] && paths+=("history/forecast_outputs/${EVENT_ID}")
          [ ${#paths[@]} -gt 0 ] && git add "${paths[@]}" || true
          if git diff --cached --quiet; then
            echo "No forecast source-writer changes to commit."
          else
            git commit -m "forecast: write gate source rows for ${EVENT_ID}"
            git push
          fi
