name: F1 Workbook KPI Refresh - Safe Test Button

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  safe-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl pandas requests

      - name: Run safe test
        run: |
          python scripts/workbook_kpi_refresh/apply_workbook_kpi_refresh_v1.py --safe-test --repo-root "$GITHUB_WORKSPACE"

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: workbook-kpi-refresh-safe-test-runtime
          path: _runtime/
          if-no-files-found: ignore
