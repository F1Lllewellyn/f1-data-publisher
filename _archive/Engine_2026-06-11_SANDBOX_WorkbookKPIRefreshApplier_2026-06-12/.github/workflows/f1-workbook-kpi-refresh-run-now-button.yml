name: F1 Workbook KPI Refresh - Run Now Button

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  run-now:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl pandas requests

      - name: Apply sandbox workbook/KPI refresh
        run: |
          python scripts/workbook_kpi_refresh/apply_workbook_kpi_refresh_v1.py --repo-root "$GITHUB_WORKSPACE"

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: workbook-kpi-refresh-runtime
          path: _runtime/
          if-no-files-found: ignore

      - name: Commit valid sandbox outputs only
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add latest/workbook_kpi_refresh_applier history/workbook_kpi_refresh_applier
          if git diff --cached --quiet; then
            echo "No workbook/KPI refresh changes to commit."
          else
            git commit -m "Add sandbox workbook KPI refresh artifacts"
            git push
          fi
