name: F1 Workflow Meta-Health - Safe Test Button

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  workflow-meta-health:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Run workflow meta-health check
        run: |
          python scripts/ops/f1_workflow_meta_health_check_v1.py

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: f1-workflow-meta-health-runtime
          path: _runtime/workflow_meta_health/
          if-no-files-found: ignore
