name: F1 Forecast/Fantasy Readiness Dashboard - Safe Test Button

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  safe-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pandas requests openpyxl
      - name: Run dashboard connector health check
        run: |
          python scripts/dashboard_connector/health_check_dashboard_connector_v1.py --mode safe_test --runtime-dir _runtime/dashboard_connector
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: dashboard-connector-safe-test-runtime
          path: _runtime/dashboard_connector
          if-no-files-found: ignore
