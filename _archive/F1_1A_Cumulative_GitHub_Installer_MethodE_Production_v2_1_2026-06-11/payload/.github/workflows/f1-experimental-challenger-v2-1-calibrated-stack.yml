name: F1 Experimental Challenger v2.1 Calibrated Gate-Aware Stack

on:
  workflow_dispatch:
    inputs:
      event_id:
        description: Event/session identifier for policy validation
        required: false
        default: manual_v2_1_policy_validation
      commit_outputs:
        description: Commit output artifacts back to repo
        required: false
        default: 'true'

permissions:
  contents: write

jobs:
  challenger-v2-1:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: python -m pip install --upgrade pip pandas
      - name: Run Challenger v2.1 policy validation
        run: |
          python scripts/challenger_v2_1/run_experimental_challenger_v2_1_calibrated_stack.py             --event-id "${{ github.event.inputs.event_id || 'scheduled_policy_validation' }}"             --commit-outputs "${{ github.event.inputs.commit_outputs || 'true' }}"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: experimental-challenger-v2-1-policy
          path: |
            latest/experimental_challenger_v2_1/**
            history/experimental_challenger_v2_1/**
      - name: Commit outputs
        if: ${{ github.event.inputs.commit_outputs == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add latest/experimental_challenger_v2_1 history/experimental_challenger_v2_1 || true
          if git diff --cached --quiet; then
            echo "No Challenger v2.1 output changes to commit."
          else
            git commit -m "Add Experimental Challenger v2.1 policy validation outputs"
            git push
          fi
