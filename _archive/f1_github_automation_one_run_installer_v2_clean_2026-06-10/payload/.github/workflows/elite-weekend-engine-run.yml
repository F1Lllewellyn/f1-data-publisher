name: Elite Weekend Engine Run

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "pre_event"
        type: choice
        options:
          - pre_event
          - post_event
          - maintenance

jobs:
  elite_engine_run:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: |
          python -m pip install --upgrade pip
          pip install pandas numpy pyarrow requests tqdm python-dateutil

      - name: Run elite weekend orchestrator
        run: |
          python scripts/weekend_run_orchestrator.py \
            --mode "${{ github.event.inputs.mode }}" \
            --output-dir output/elite_weekend_run

      - name: Upload elite engine artifact
        uses: actions/upload-artifact@v4
        with:
          name: elite-weekend-engine-${{ github.event.inputs.mode }}-${{ github.run_number }}
          path: output/elite_weekend_run/**
          retention-days: 90
